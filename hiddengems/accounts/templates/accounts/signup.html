<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Hidden Gems</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        nav {
            background-color: #111827;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        nav .nav-buttons a {
            padding: 8px 20px;
            border: 1px solid white;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            margin-left: 10px;
            font-size: 0.9rem;
        }

        .container {
            max-width: 420px;
            margin: 80px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: white;
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 40px;
        }

        .form-card {
            background-color: #111827;
            border-radius: 12px;
            padding: 40px;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #d1d5db;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #6366f1;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #6366f1;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #4f46e5;
        }

        .errors {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .help-text {
            color: #6b7280;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .switch-link a {
            color: #6366f1;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Hidden Gems</a>
        <div class="nav-buttons">
            <a href="/accounts/login/">Login</a>
            <a href="/accounts/signup/">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Join the Hidden Gems community</p>

        <div class="form-card">
            <form method="post">
                {% csrf_token %}

                <!-- Username -->
                <div class="field-group">
                    <label for="id_username">Username</label>
                    {{ form.username }}
                    <div class="errors">{{ form.username.errors }}</div>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <label for="id_password1">Password</label>
                    {{ form.password1 }}
                    <div class="help-text">{{ form.password1.help_text }}</div>
                    <div class="errors">{{ form.password1.errors }}</div>
                </div>

                <!-- Confirm Password -->
                <div class="field-group">
                    <label for="id_password2">Confirm Password</label>
                    {{ form.password2 }}
                    <div class="errors">{{ form.password2.errors }}</div>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>

        <div class="switch-link">
            Already have an account? <a href="/accounts/login/">Log In</a>
        </div>
    </div>
</body>
</html>
