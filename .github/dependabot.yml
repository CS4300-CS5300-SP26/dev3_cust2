## @file
# Dependabot configuration file to enable Github services
# for managing and updating dependencies.

version: 2 # Dependabot Config File Scheme as of April 2026
updates:
  - package-ecosystem: "pip"
    directory: "/"
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    commit-message:
      prefix: "Pip"
    rebase-strategy: "auto"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    commit-message:
      prefix: "GitHub Action"
    rebase-strategy: "auto"
    groups:
      actions-dependencies:
        patterns:
          - '*'