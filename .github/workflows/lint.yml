# Modified March 16, 2026

# Function: This automation file will conduct lint
# analysis on python files pushed to the repository

name: Flake8 Lint

on:
  pull_request:
    # Trigger the workflow only for pull requests
    # containing python files
    paths:
      - '**/*.py'
    
    # Specifies types of pull request activities
    types:
      - opened
      - reopened
      - synchronize

# Sets the permissions for the GITHUB_TOKEN
# generated by the workflow
permissions:
  contents: read
  pull-requests: write
  actions: write

# List of jobs to conduct Lint Analysis
jobs:
  flake8_py3:
    runs-on: ubuntu-latest
    steps:
      # Pulls the latest data on the repository
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Installs Python with latest architecture
      # Last updated March 16, 2026
      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: 3.14.3
          architecture: x64
          cache: 'pip'  # Caches pip dependencies

      # Installs Python dependencies using pip cache
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      # Run Flake8 on all .py files in the repo
      - name: Run Flake8
        uses: suo/flake8-github-action@releases/v1
        with:
          checkName: 'flake8_py3'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
