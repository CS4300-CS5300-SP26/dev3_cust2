on: push
name: Push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      uses: actions/setup-python@v1
      with:
        python-version: 3.14.3
        architecture: x64
    - name: Run Flake8
      uses: suo/flake8-github-action@releases/v1
      with:
        checkName: 'lint'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
