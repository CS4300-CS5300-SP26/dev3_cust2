name: Flake8-Lint

on:
  push:
    paths:
      - '*.py'
      
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      uses: actions/setup-python@v1
      with:
        python-version: 3.14.3
        architecture: x64
    - name: Install flake8
      run: pip install flake8
    - name: Run Flake8
      run: flake8 .
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
